<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Assignment Form</title>
</head>
<body>

<h2>Project Assignment Form</h2>

<form action="/submit_profile" method="POST">

<p>Complete your profile to get assigned to internal projects.</p>

<br />

<label for="full_name">Full Name:</label>
<input type="text" id="full_name" name="full_name" required>

<br /><br />

<label for="email">Email Address:</label>
<input type="email" id="email" name="email" required>

<br /><br />

<label for="experience">Years of Experience:</label>
<select id="experience" name="experience" required>
    <option value="">Select your level</option>
    <option value="junior">Junior (0-2 years)</option>
    <option value="mid">Mid-level (2-5 years)</option>
    <option value="senior">Senior (5+ years)</option>
</select>

<br /><br />

<label for="tech_stack">Primary Technology Stack:</label>
<select id="tech_stack" name="tech_stack" required>
    <option value="">Choose one</option>
    <option value="backend">Backend Development</option>
    <option value="frontend">Frontend Development</option>
    <option value="fullstack">Full-Stack Development</option>
    <option value="data">Data Engineering</option>
    <option value="devops">DevOps</option>
    <option value="mobile">Mobile Development</option>
</select>

<br /><br />


<label for="projects">Available Projects:</label>
<select id="projects" multiple size="8" name="projects" required>
    {% for project in projects %}
    <option value="{{ project.id }}">{{ project.name }}</option>
    {% endfor %}
</select>

<br /><br />

<label for="duration">Preferred Project Duration:</label><br>
<input type="radio" id="short" value="short" name="duration" required> <label for="short">Short-term (1-3 months)</label>
<input type="radio" id="medium" value="medium" name="duration" > <label for="medium">Medium-term (3-6 months)</label>
<input type="radio" id="long" value="long" name="duration" > <label for="long">Long-term (6+ months)</label>

<br /><br />

<label for="additional_skills">Additional Skills (optional):</label>
<input type="text" id="additional_skills" placeholder="e.g., Python, Docker, React" name="additional_skills">

<br /><br />

<label for="availability">Availability:</label>
<input type="checkbox" id="availability" name="availability" value="yes" required> I confirm my availability for the selected projects

<br /><br />

<input type="submit" value="Save Profile">
<input type="reset" value="Clear Form">

</form>

</body>
</html>
