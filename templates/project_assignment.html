<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Assignment Form</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="card">
    <div class="card-header">
        <h2>Project Assignment Form</h2>
        <p>Complete your profile to get assigned to internal projects</p>
    </div>
    <div class="card-body">

        {% if message %}
        <div class="success-banner">{{ message }}</div>
        {% endif %}

        {% if errors %}
        <div class="error-banner">
            <ul>
                {% for error in errors %}
                <li>{{ error }}</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}

        <form action="/submit_profile" method="POST">

            <p class="section-title">Personal information</p>

            <div class="form-row">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" required
                    value="{{ (form_data.first_name ~ ' ' ~ form_data.last_name) if form_data else '' }}">
            </div>

            <div class="form-row">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required
                    value="{{ form_data.email_address if form_data else '' }}">
            </div>

            <div class="form-row">
                <label for="experience">Experience Level</label>
                <select id="experience" name="experience" required>
                    <option value="">Select your level</option>
                    <option value="junior" {{ 'selected' if form_data and form_data.experience_level == 'junior' }}>Junior (0-2 years)</option>
                    <option value="mid"    {{ 'selected' if form_data and form_data.experience_level == 'mid' }}>Mid-level (2-5 years)</option>
                    <option value="senior" {{ 'selected' if form_data and form_data.experience_level == 'senior' }}>Senior (5+ years)</option>
                </select>
            </div>

            <div class="form-row">
                <label for="tech_stack">Primary Tech Stack</label>
                <select id="tech_stack" name="tech_stack" required>
                    <option value="">Choose one</option>
                    <option value="backend"   {{ 'selected' if form_data and form_data.primary_technology_stack == 'backend' }}>Backend Development</option>
                    <option value="frontend"  {{ 'selected' if form_data and form_data.primary_technology_stack == 'frontend' }}>Frontend Development</option>
                    <option value="fullstack" {{ 'selected' if form_data and form_data.primary_technology_stack == 'fullstack' }}>Full-Stack Development</option>
                    <option value="data"      {{ 'selected' if form_data and form_data.primary_technology_stack == 'data' }}>Data Engineering</option>
                    <option value="devops"    {{ 'selected' if form_data and form_data.primary_technology_stack == 'devops' }}>DevOps</option>
                    <option value="mobile"    {{ 'selected' if form_data and form_data.primary_technology_stack == 'mobile' }}>Mobile Development</option>
                </select>
            </div>

            <hr class="divider">
            <p class="section-title">Project preferences</p>

            <div class="form-row">
                <label for="projects">Available Projects</label>
                <select id="projects" multiple size="8" name="projects" required>
                    {% for project in projects %}
                    <option value="{{ project.project_id }}"
                        {{ 'selected' if selected_projects and (project.project_id | string) in selected_projects }}>
                        {{ project.project_name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-row">
                <label>Preferred Duration</label>
                <div class="radio-group">
                    <label class="radio-item">
                        <input type="radio" id="short" value="short" name="duration" required
                            {{ 'checked' if form_data and form_data.preferred_project_duration == 'short' }}>
                        Short-term (1-3 months)
                    </label>
                    <label class="radio-item">
                        <input type="radio" id="medium" value="medium" name="duration"
                            {{ 'checked' if form_data and form_data.preferred_project_duration == 'medium' }}>
                        Medium-term (3-6 months)
                    </label>
                    <label class="radio-item">
                        <input type="radio" id="long" value="long" name="duration"
                            {{ 'checked' if form_data and form_data.preferred_project_duration == 'long' }}>
                        Long-term (6+ months)
                    </label>
                </div>
            </div>

            <div class="form-row">
                <label for="additional_skills">Additional Skills</label>
                <input type="text" id="additional_skills" name="additional_skills"
                    placeholder="e.g. Python, Docker, React"
                    value="{{ form_data.additional_skills if form_data and form_data.additional_skills else '' }}">
            </div>

            <hr class="divider">

            <div class="checkbox-row">
                <div></div>
                <label class="checkbox-label">
                    <input type="checkbox" id="availability" name="availability" value="yes" required
                        {{ 'checked' if form_data and form_data.confirmed_availability }}>
                    I confirm my availability for the selected projects
                </label>
            </div>

            <div class="btn-row">
                <input type="reset" value="Clear Form" class="btn-secondary">
                <input type="submit" value="Save Profile" class="btn-primary">
            </div>

        </form>
    </div>
</div>
</body>
